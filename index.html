
<h2 class="sr-only">Facebook хамгийн их үзэлттэй post-уудын жагсаалт rank-тай</h2>
<div id="app" style="padding:1rem 0; font-family:var(--font-sans);">
  <div id="loading" style="text-align:center;padding:3rem;color:var(--color-text-secondary);font-size:14px;">
    <i class="ti ti-loader" style="font-size:24px;display:block;margin-bottom:8px;opacity:0.5"></i>
    Post-уудын мэдээлэл татаж байна...
  </div>
  <div id="error-box" style="display:none;background:var(--color-background-danger);color:var(--color-text-danger);border:0.5px solid var(--color-border-danger);border-radius:var(--border-radius-md);padding:12px 16px;font-size:13px;margin-bottom:1rem;"></div>
  <div id="main" style="display:none;">
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:1.5rem;">
      <div>
        <div style="font-size:11px;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;">Top Posts Ranking</div>
        <div style="font-size:20px;font-weight:500;color:var(--color-text-primary)" id="page-title">—</div>
      </div>
      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
        <select id="page-sel" onchange="onPageChange()" style="font-size:13px;padding:6px 10px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-tertiary);background:var(--color-background-secondary);color:var(--color-text-primary);"></select>
        <select id="sort-sel" onchange="renderPosts()" style="font-size:13px;padding:6px 10px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-tertiary);background:var(--color-background-secondary);color:var(--color-text-primary);">
          <option value="impressions">Impression-аар</option>
          <option value="reach">Reach-аар</option>
          <option value="engagement">Engagement-аар</option>
        </select>
      </div>
    </div>

    <div id="summary-cards" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:1.5rem;"></div>

    <div id="posts-list"></div>
  </div>
</div>

<script>
const TOKEN = "EAAd4SZASPQAcBRihnFyaRUvkxKcpNlyTZA16dSV2wu2K1m4VgekYqc0cnL0g5TYOP5E7t4YsSSuw8f56KBxKETJTGZALfopZATYeLVGm8cZBwNTX9KXX8xUmuw62k4vqJBSjLl1CEmkFdKyXnrNoAhuGZAWBNsU1b2l3C54IZCXJw2QZAsL0cd86K4RQY3gD40SJqj3rIUe4FZAIOAYxou7SYj9fLnTdjdgZAcuNZC6qaaoIcQmFOQs0DhoZCQEJuZC5deXtvVZCFeLTtqF0T3oJU6tkDJkQZDZD";
const BASE = "https://graph.facebook.com/v25.0";
let pages=[], posts=[];

function showError(msg){
  document.getElementById('error-box').textContent='⚠️ '+msg;
  document.getElementById('error-box').style.display='block';
  document.getElementById('loading').style.display='none';
  document.getElementById('main').style.display='block';
}

function medal(rank){
  if(rank===1) return '<span style="font-size:18px;">🥇</span>';
  if(rank===2) return '<span style="font-size:18px;">🥈</span>';
  if(rank===3) return '<span style="font-size:18px;">🥉</span>';
  return `<span style="display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:50%;background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);font-size:12px;font-weight:500;color:var(--color-text-secondary);">${rank}</span>`;
}

function fmt(n){ return n!=null?Number(n).toLocaleString():'—'; }

function renderSummary(){
  const sortKey = document.getElementById('sort-sel').value;
  const sorted = [...posts].sort((a,b)=>(b[sortKey]||0)-(a[sortKey]||0));
  const totalImp = posts.reduce((s,p)=>s+(p.impressions||0),0);
  const totalReach = posts.reduce((s,p)=>s+(p.reach||0),0);
  const totalEng = posts.reduce((s,p)=>s+(p.engagement||0),0);
  document.getElementById('summary-cards').innerHTML = `
    <div style="background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:1rem;border-left:3px solid #534AB7;">
      <div style="font-size:11px;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px;">Нийт Post</div>
      <div style="font-size:22px;font-weight:500;color:var(--color-text-primary);font-family:var(--font-mono)">${posts.length}</div>
    </div>
    <div style="background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:1rem;border-left:3px solid #0F6E56;">
      <div style="font-size:11px;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px;">Нийт Reach</div>
      <div style="font-size:22px;font-weight:500;color:var(--color-text-primary);font-family:var(--font-mono)">${fmt(totalReach)}</div>
    </div>
    <div style="background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:1rem;border-left:3px solid #BA7517;">
      <div style="font-size:11px;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px;">Нийт Impressions</div>
      <div style="font-size:22px;font-weight:500;color:var(--color-text-primary);font-family:var(--font-mono)">${fmt(totalImp)}</div>
    </div>
    <div style="background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:1rem;border-left:3px solid #993556;">
      <div style="font-size:11px;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px;">Нийт Engagement</div>
      <div style="font-size:22px;font-weight:500;color:var(--color-text-primary);font-family:var(--font-mono)">${fmt(totalEng)}</div>
    </div>
  `;
}

function renderPosts(){
  const sortKey = document.getElementById('sort-sel').value;
  const sorted = [...posts].sort((a,b)=>(b[sortKey]||0)-(a[sortKey]||0));
  renderSummary();
  const maxVal = sorted[0]?.[sortKey]||1;

  document.getElementById('posts-list').innerHTML = sorted.map((p,i)=>{
    const barW = Math.round(((p[sortKey]||0)/maxVal)*100);
    const date = p.created_time?new Date(p.created_time).toLocaleDateString('mn-MN',{month:'short',day:'numeric',year:'numeric'}):'';
    const msg = (p.message||'').slice(0,120) + ((p.message||'').length>120?'…':'');
    const isTop = i<3;

    return `
    <div style="display:flex;gap:12px;align-items:flex-start;background:var(--color-background-primary);border:${isTop?'1.5px solid var(--color-border-info)':'0.5px solid var(--color-border-tertiary)'};border-radius:var(--border-radius-lg);padding:14px;margin-bottom:10px;position:relative;">
      ${isTop?`<div style="position:absolute;top:-1px;right:12px;background:var(--color-background-info);color:var(--color-text-info);font-size:10px;font-weight:500;padding:2px 8px;border-radius:0 0 6px 6px;letter-spacing:0.5px;">TOP ${i+1}</div>`:''}
      <div style="flex-shrink:0;display:flex;align-items:center;justify-content:center;width:32px;margin-top:2px;">
        ${medal(i+1)}
      </div>
      ${p.image?`<img src="${p.image}" alt="post зураг" style="width:72px;height:72px;object-fit:cover;border-radius:8px;flex-shrink:0;border:0.5px solid var(--color-border-tertiary);">`:`<div style="width:72px;height:72px;border-radius:8px;background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);display:flex;align-items:center;justify-content:center;flex-shrink:0;"><i class="ti ti-photo-off" style="font-size:20px;color:var(--color-text-tertiary)" aria-hidden="true"></i></div>`}
      <div style="flex:1;min-width:0;">
        <div style="font-size:13px;color:var(--color-text-primary);margin-bottom:6px;line-height:1.4;">${msg||'<em style="color:var(--color-text-tertiary)">Текст байхгүй (зураг/видео)</em>'}</div>
        <div style="font-size:11px;color:var(--color-text-tertiary);margin-bottom:8px;">${date}</div>
        <div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:8px;">
          <span style="font-size:12px;color:var(--color-text-secondary);"><i class="ti ti-eye" style="font-size:13px;vertical-align:-1px;margin-right:3px" aria-hidden="true"></i>${fmt(p.impressions)}</span>
          <span style="font-size:12px;color:var(--color-text-secondary);"><i class="ti ti-users" style="font-size:13px;vertical-align:-1px;margin-right:3px" aria-hidden="true"></i>${fmt(p.reach)}</span>
          <span style="font-size:12px;color:var(--color-text-secondary);"><i class="ti ti-heart" style="font-size:13px;vertical-align:-1px;margin-right:3px" aria-hidden="true"></i>${fmt(p.engagement)}</span>
        </div>
        <div style="background:var(--color-background-secondary);border-radius:4px;height:5px;width:100%;overflow:hidden;">
          <div style="height:100%;width:${barW}%;background:${sortKey==='impressions'?'#534AB7':sortKey==='reach'?'#0F6E56':'#993556'};border-radius:4px;transition:width 0.4s ease;"></div>
        </div>
      </div>
    </div>`;
  }).join('');
}

async function loadPosts(page){
  document.getElementById('posts-list').innerHTML=`<div style="text-align:center;padding:2rem;color:var(--color-text-tertiary);font-size:13px;">Post-уудын insights татаж байна...</div>`;
  document.getElementById('summary-cards').innerHTML='';
  posts=[];
  try {
    const res = await fetch(`${BASE}/${page.id}/posts?fields=id,message,created_time,full_picture&limit=25&access_token=${page.access_token}`);
    const data = await res.json();
    if(data.error) throw new Error(data.error.message);
    const rawPosts = data.data||[];
    if(!rawPosts.length){document.getElementById('posts-list').innerHTML='<div style="text-align:center;padding:2rem;color:var(--color-text-tertiary);">Post олдсонгүй.</div>';return;}

    // Fetch insights for each post in batches
    const results = await Promise.all(rawPosts.map(async p=>{
      try {
        const ir = await fetch(`${BASE}/${p.id}/insights?metric=post_impressions,post_impressions_unique,post_engaged_users&access_token=${page.access_token}`);
        const id = await ir.json();
        const ins = {};
        (id.data||[]).forEach(m=>{
          const v = m.values?.[0]?.value||0;
          if(m.name==='post_impressions') ins.impressions=v;
          if(m.name==='post_impressions_unique') ins.reach=v;
          if(m.name==='post_engaged_users') ins.engagement=v;
        });
        return {...p, image:p.full_picture||null, ...ins};
      } catch(e){ return {...p, image:p.full_picture||null}; }
    }));
    posts = results;
    renderPosts();
  } catch(e){ showError('Post татахад алдаа: '+e.message); }
}

function onPageChange(){
  const id = document.getElementById('page-sel').value;
  const page = pages.find(p=>p.id===id);
  if(page){ document.getElementById('page-title').textContent=page.name; loadPosts(page); }
}

async function init(){
  try {
    const res = await fetch(`${BASE}/me/accounts?fields=id,name,access_token&access_token=${TOKEN}`);
    const data = await res.json();
    if(data.error) throw new Error(data.error.message);
    pages = data.data||[];
    if(!pages.length) throw new Error('Manage хийдэг Facebook хуудас олдсонгүй.');
    const sel = document.getElementById('page-sel');
    pages.forEach(p=>{ const o=document.createElement('option'); o.value=p.id; o.textContent=p.name; sel.appendChild(o); });
    document.getElementById('loading').style.display='none';
    document.getElementById('main').style.display='block';
    document.getElementById('page-title').textContent=pages[0].name;
    loadPosts(pages[0]);
  } catch(e){ showError(e.message); }
}
init();
</script>
